<!DOCTYPE html>
  <html lang="en">
    <head>
    <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AQLI Factsheet Access</title>
        
        <style>
        /* AQLI Colors */
        :root {
          --aqli-blue: #003d66;
            --aqli-orange: #ff7a00;
            --aqli-light: #f2f6f9;
        }
      
      body {
        margin: 0;
        padding: 0;
        font-family: "Helvetica Neue", Arial, sans-serif;
        background: var(--aqli-light);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      
      .card {
        text-align: center;
        background: white;
        padding: 50px 60px;
        border-radius: 14px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        width: 380px;
      }
      
      .logo {
        width: 160px;
        margin-bottom: 25px;
      }
      
      h1 {
        font-size: 24px;
        color: var(--aqli-blue);
        margin-bottom: 15px;
        font-weight: 700;
      }
      
      p {
        font-size: 16px;
        color: #444;
          margin-bottom: 30px;
      }
      
      a.button {
        display: inline-block;
        padding: 12px 22px;
        background-color: var(--aqli-orange);
        color: white;
        text-decoration: none;
        font-size: 17px;
        font-weight: 600;
        border-radius: 8px;
        transition: 0.25s ease-in-out;
        letter-spacing: 0.3px;
      }
      
      a.button:hover {
        background-color: #e56f00;
          transform: translateY(-2px);
      }
      </style>
        </head>
        
        <body>
        <div class="card">
        <!-- Add AQLI logo (optional) -->
        <img class="logo" src="https://aqli.epic.uchicago.edu/wp-content/uploads/2018/12/AQLI_logo.svg" alt="AQLI Logo">
        
        <h1>AQLI Factsheet Dashboard</h1>
        <p>Click below to access the official AQLI interactive factsheet dashboard.</p>
        
        <a class="button" href="https://aqli-epic.shinyapps.io/factsheetdf/#" target="_blank">
        Open Dashboard
      </a>
        </div>
        </body>
        </html>
